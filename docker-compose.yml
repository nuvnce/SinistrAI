version: '3.8'

services:

  # ── Base de données PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sinistrai_db
    environment:
      POSTGRES_DB:       sinistrai
      POSTGRES_USER:     sinistrai_user
      POSTGRES_PASSWORD: sinistrai_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sinistrai_user -d sinistrai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Application SinistrAI ───────────────────────────────────────────────
  app:
    build: .
    container_name: sinistrai_app
    environment:
      DATABASE_URL:   postgresql://sinistrai_user:sinistrai_pass@db:5432/sinistrai
      SECRET_KEY:     sinistrai-docker-secret-2025
      MAIL_USERNAME:  ${MAIL_USERNAME}
      MAIL_PASSWORD:  ${MAIL_PASSWORD}
      PRODUCTION:     false
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data: