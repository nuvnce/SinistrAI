{% extends 'base.html' %}
{% block title %}Connexion{% endblock %}

{% block login_content %}
<div style="min-height:100vh; background:var(--bg-main); display:flex; align-items:center; justify-content:center; padding:20px;">

  <div style="width:100%; max-width:420px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:40px;">
      <div style="width:64px; height:64px; background:linear-gradient(135deg,#2563EB,#1D4ED8); border-radius:18px; display:inline-flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 0 32px rgba(37,99,235,0.4); margin-bottom:20px;">
        🛡️
      </div>
      <h1 style="font-size:28px; font-weight:700; color:var(--text-primary); margin-bottom:6px;">SinistrAI</h1>
      <p style="font-size:14px; color:var(--text-secondary);">Plateforme de gestion des sinistres santé</p>
    </div>

    <!-- Carte -->
    <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:36px; box-shadow:0 20px 60px var(--shadow);">

      <h2 style="font-size:18px; font-weight:600; color:var(--text-primary); margin-bottom:6px;">Connexion</h2>
      <p style="font-size:13px; color:var(--text-secondary); margin-bottom:28px;">Entrez vos identifiants pour accéder à la plateforme.</p>

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div style="margin-bottom:20px;">
          <label class="form-label-dark">Adresse email</label>
          <div style="position:relative;">
            <i class="bi bi-envelope" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:15px;"></i>
            <input type="email" name="email" class="form-control-dark"
                   style="padding-left:38px;" placeholder="admin@sinistrai.com" required autofocus/>
          </div>
        </div>

        <div style="margin-bottom:28px;">
          <label class="form-label-dark">Mot de passe</label>
          <div style="position:relative;">
            <i class="bi bi-lock" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:15px;"></i>
            <input type="password" name="password" id="passwordInput" class="form-control-dark"
                   style="padding-left:38px; padding-right:42px;" placeholder="••••••••" required/>
            <button type="button" onclick="togglePassword()"
                    style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:15px; padding:0;">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-primary-dark" style="width:100%; justify-content:center; padding:12px;">
          <i class="bi bi-box-arrow-in-right"></i>
          Se connecter
        </button>
      </form>
    </div>

    <!-- Toggle thème sur login -->
    <div style="text-align:center; margin-top:24px;">
      <button onclick="toggleThemeLogin()" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:13px; display:inline-flex; align-items:center; gap:6px;">
        <i class="bi bi-circle-half" id="loginThemeIcon"></i>
        <span id="loginThemeText">Thème clair</span>
      </button>
    </div>

    <p style="text-align:center; font-size:12px; color:var(--text-muted); margin-top:16px;">
      © 2026 SinistrAI — Usage académique UCAO-UUT
    </p>
  </div>
</div>

<script>
  // Appliquer thème sauvegardé
  const saved = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateLoginThemeBtn(saved);

  function updateLoginThemeBtn(theme) {
    const icon = document.getElementById('loginThemeIcon');
    const text = document.getElementById('loginThemeText');
    if (icon) icon.className = theme === 'dark' ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
    if (text) text.textContent = theme === 'dark' ? 'Thème clair' : 'Thème sombre';
  }

  try {
    const saved = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);
    updateLoginThemeBtn(saved);
  } catch(e) {
    document.documentElement.setAttribute('data-theme', 'dark');
    updateLoginThemeBtn('dark');
  }

  function toggleThemeLogin() {
    const current = document.documentElement.getAttribute('data-theme');
    const next    = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch(e) {}
    updateLoginThemeBtn(next);
  }


  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type   = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type   = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
{% endblock %}
